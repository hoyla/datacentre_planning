# Inferred map-pin coordinates for applications where the raw PlanIt
# record has no `location_x` / `location_y`. Per the project's
# never-mutate-source-material principle, these live ALONGSIDE the raw
# record — `dcp.map._row_to_point` falls back to this file when the
# source coords are null. Inferred pins are flagged with
# `inferred_coords: true` in the worklist geojson + popup so they're
# visually distinguishable from source-coord pins.
#
# Each entry records:
#   - ref:       the application_ref
#   - lat:       inferred latitude
#   - lon:       inferred longitude
#   - source:    defensible provenance — how the coords were derived

entries:

  - ref: Havering/Z0001.24
    lat: 51.5434
    lon: 0.3215
    source: |
      Nominatim forward-search for "Corner Farm, North Ockendon, RM14"
      returned (51.5434, 0.3215) at "Corner Farm, Fen Lane, London
      Borough of Havering, RM14 3RB" (2026-05-17). The application
      address is "East Havering Data Centre Campus North of Corner
      Farm Cottage Fen Lane" — the LDO campus extent is the Fen Lane
      / North Ockendon parcels north of this point; pin is set at
      Corner Farm itself as the named landmark in the address.

  - ref: MiltonKeynes/PLN/2024/2768
    lat: 52.0563
    lon: -0.7563
    source: |
      Nominatim forward-search for "Rockingham Drive, Linford Wood,
      Milton Keynes" returned three close candidates spanning MK14
      6PD / 6HG / 6PP at the Linford Wood Business Centre area
      (2026-05-17). Pin is set to the midpoint of the road segment —
      site is "Land off Rockingham Drive", precise plot extent not
      named in the address text.

