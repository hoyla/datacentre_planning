# Foxglove top-10 application families.
#
# `discovered_via:foxglove_top10` flags these so they surface on the
# deep-read worklist even when the LLM correctly classifies a procedural
# follow-on as "unrelated" (the rubric is right; the family lineage is
# still substantive — that's the architectural insight behind the
# parent-backfill pass). Pair with the export filter:
#
#   worth_deep_read IN ('yes', 'maybe')
#   OR 'foxglove_top10' = ANY(discovered_via)
#
# Source: data/prior_art_sources/foxglove_top10.md (Foxglove report verbatim)
# Reconciliation: data/prior_art_sources/foxglove_reconciliation.md (8 confirmed,
# 1 probable, 1 unconfirmed as of 2026-05-12).
#
# Apply with: scripts/tag_priors.py data/priors/foxglove_top10.yaml

tag: foxglove_top10

# Each family lists the substantive parent + every procedural/related ref we
# already have. Adding follow-ons later is just an append to this list — re-run
# the tagger; it's idempotent.

families:
