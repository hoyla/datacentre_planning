# Known duplicate applications.
#
# Some applications appear in our universe more than once because a planning
# application that straddles a borough boundary gets indexed by the primary
# planning authority AND by each consulted neighbour. Each council assigns
# its own internal reference, so the duplicates only become visible when
# the description and address match.
#
# Tag format: `duplicate_of:<primary_application_ref>`. The lineage renderer
# in `dcp/worklist.py` knows how to humanise it (see `expand_lineage`); the
# export then explains that docs / findings live on the primary record.
#
# Idempotent: re-running adds nothing new to `applications.discovered_via`.
#
# Apply with: scripts/tag_duplicates.py
#
# Source of truth — confirmed by description + address match between each
# `copy` and its `primary` (see `dcp/sources/<adapter>.py` adapters and the
# manual cross-check in extract_findings.py).

duplicates:
  - primary: Hillingdon/75111/APP/2020/1955
    notes: |
      Ark Project Union outline at Bulls Bridge Industrial Estate, North
      Hyde Gardens, Hayes. Sits on the Hillingdon-Hounslow boundary, with
      the western edge near Ealing too — both councils were consulted and
      assigned internal refs in their own portals.
    copies:
      - Hounslow/C/2020/2124
      - Ealing/202655CONS

  - primary: TowerHamlets/PA/22/01982/A1
    notes: |
      Astoria Way DC change-of-use (1-6 Astoria Way, E14 9FT). The /NC
      (Neighbour Consultation) record is the earlier consultation phase
      of the same scheme; the substantive application is /A1. /NC has
      been "withdrawn from public viewing" by Tower Hamlets (Idox status
      message confirmed 2026-05-16); docs and findings live on /A1.
    copies:
      - TowerHamlets/PA/22/00693/NC

  - primary: Hounslow/P/2017/2665
    notes: |
      Southall Waste Depot BESS + generator + photovoltaic scheme on
      Southall Lane. /P/2017/2665 is the substantive permission; /P/2017/
      4684 is the condition-3+4 (boundary + parking) discharge follow-on
      for the same works. NOT a data centre — worklist false-positive
      caught via "battery storage" + "generator" signals.
    copies:
      - Hounslow/P/2017/4684

  - primary: Slough/P/00437/093
    notes: |
      Langley Business Centre, Station Road, Langley, Slough (SL3 8DS) —
      data-centre outline (up to 93,000 sqm DC on plot B + mixed-use
      including energy centre on plot A). Application sits on the
      Slough/Bucks boundary; Chiltern South Bucks was consulted twice
      (earlier all-matters-reserved version PL/20/0646/ADJ, and the
      amended description PL/20/2041/ADJ). The Bucks side's PA-CSB Idox
      portal is reachable; the Slough primary is on an Agile portal we
      can't fetch from yet. Some consultation-response docs (Bucks
      Environmental Health, Slough Consultation) have been ingested
      against PL/20/2041/ADJ as the editorially-substantive content
      we have access to until the Slough primary is reached.
    copies:
      - ChilternSouthBucks/PL/20/2041/ADJ
      - ChilternSouthBucks/PL/20/0646/ADJ
